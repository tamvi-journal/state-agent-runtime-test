version: "3.9"

services:
  state-memory-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: state-memory-agent-dev
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: src
      APP_MODE: dev
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: info
      APP_MODULE: server.fastapi_app:app
      APP_RELOAD: "false"
      WEBHOOK_BASE_PATH: /webhooks
    volumes:
      - .:/app
    command: >
      python -m uvicorn server.fastapi_app:app
      --host 0.0.0.0
      --port 8000
