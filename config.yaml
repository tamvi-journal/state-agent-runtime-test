# State-Memory Agent V1 Config
# Single file. V2 splits into settings/prompts/thresholds.

model:
  backend: "anthropic"
  model_name: "claude-sonnet-4-20250514"
  max_tokens_pass_a: 2000
  max_tokens_pass_b: 4000

state:
  variables:
    - coherence
    - drift
    - tool_overload
    - context_fragmentation
  initial_values:
    coherence: 0.80
    drift: 0.00
    tool_overload: 0.00
    context_fragmentation: 0.00
  default_mode: "baseline"

thresholds:
  stability_high: 0.65
  stability_low: 0.35
  disruption_high: 0.55
  disruption_low: 0.30
  shift_magnitude_for_acknowledge: 0.30

policy_gate:
  type: "rule_based"

context:
  max_deltas_in_context: 10
  summary_refresh_interval: 3

memory_tiers:
  active_window_days: 30
  dormant_window_days: 180
  genuine_pin_enabled: true
  compost_keep_summary: true
  tick_interval_hours: 24
  promote_none_to_genuine_enabled: true
  promote_reactivation_count: 3
  promote_window_days: 14

paths:
  memory_dir: "./memory/content"
  sessions_dir: "./sessions"
